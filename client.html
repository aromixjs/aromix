<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MsgPack POST Tester</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: sans-serif;
    }
    textarea, input {
      background: #1e293b !important;
      color: #e2e8f0 !important;
      border: 1px solid #334155 !important;
      resize: vertical;
    }
    pre {
      background: #020617;
      padding: 12px;
      border-radius: 6px;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #38bdf8;
    }
    .container {
      max-width: 700px;
      margin-top: 40px;
    }
    label {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3 class="mb-4">MsgPack POST Tester</h3>

    <div class="mb-3">
      <label for="url">URL</label>
      <input id="url" class="form-control" value="http://localhost:3000/">
    </div>

    <div class="mb-3">
      <label for="xAction">x-action (route)</label>
      <input id="xAction" class="form-control" value="user:get">
    </div>

    <div class="mb-3">
      <label for="headers">Additional Headers (JSON)</label>
      <textarea id="headers" rows="3" class="form-control">{}</textarea>
    </div>

    <div class="mb-3">
      <label for="body">Body (JSON → MsgPack)</label>
      <textarea id="body" rows="6" class="form-control">{
  "hello": "world"
}</textarea>
    </div>

    <button id="sendBtn" class="btn btn-primary w-100 mb-4">Send POST</button>

    <div>
      <h5>Response</h5>
      <div>Status: <span id="status">-</span></div>
      <pre id="response"></pre>
    </div>
  </div>

  <script type="module">
    import { encode, decode } from "https://cdn.jsdelivr.net/npm/@msgpack/msgpack@3.1/+esm";

    const sendBtn = document.getElementById("sendBtn");
    const urlInput = document.getElementById("url");
    const xActionInput = document.getElementById("xAction");
    const headersInput = document.getElementById("headers");
    const bodyInput = document.getElementById("body");
    const statusEl = document.getElementById("status");
    const responseEl = document.getElementById("response");

    sendBtn.addEventListener("click", async () => {
      statusEl.textContent = "-";
      responseEl.textContent = "";

      try {
        const userHeaders = JSON.parse(headersInput.value || "{}");
        const headers = {
          ...userHeaders,
          "Content-Type": "application/msgpack",
          "x-action": xActionInput.value || ""
        };

        const bodyJson = JSON.parse(bodyInput.value || "{}");
        const msgpackBody = encode(bodyJson);

        const res = await fetch(urlInput.value, {
          method: "POST",
          headers,
          body: msgpackBody
        });

        statusEl.textContent = `${res.status} ${res.statusText}`;

        const buffer = await res.arrayBuffer();
        const decoded = decode(new Uint8Array(buffer));
        responseEl.textContent = JSON.stringify(decoded, null, 2);

      } catch (err) {
        statusEl.textContent = "Error";
        responseEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
