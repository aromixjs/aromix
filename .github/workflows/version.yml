name: Version

on:
    push:
        branches: [main]
        paths:
            - 'change/**'
    workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
    version:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
            - run: pnpm -r build
            - run: npx beachball bump --yes

            - uses: peter-evans/create-pull-request@v7
              with:
                  commit-message: 'chore: version packages'
                  title: 'chore: version packages'
                  body: |
                      This PR was generated by beachball.
                      It bumps package versions, generates changelogs, and removes change files.
                  branch: version-packages
                  base: main
                  labels: cleanup
