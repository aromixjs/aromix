name: Publish

on:
  push:
    branches: [main]
    paths:
      - '.bumped'

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build bumped packages
        run: |
          while read -r name version; do
            pnpm --filter "$name" build
          done < .bumped

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          while read -r name version; do
            if npm view "$name@$version" version 2>/dev/null; then
              echo "✓ $name@$version already published"
            else
              echo "→ Publishing $name@$version..."
              pnpm --filter "$name" publish --access public --no-git-checks
            fi
          done < .bumped

      - name: Clean up manifest
        run: |
          git config user.name "aromix-bot"
          git config user.email "bot@aromix.dev"
          git rm .bumped
          git commit -m "chore: cleanup bumped manifest"
          git push
